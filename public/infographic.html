<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSN Coding Challenge 2026 — Infographic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --violet: #8B5CF6;
      --blue: #3B82F6;
      --teal: #14B8A6;
      --pink: #EC4899;
      --emerald: #10B981;
    }

    body {
      background: #000;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ─── Poster container (fixed aspect for print) ─── */
    .poster {
      position: relative;
      width: 1080px;
      height: 1920px;
      background: #000;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ─── Floating orbs (matching FloatingOrbs.tsx) ─── */
    .orb {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .orb--purple {
      width: 700px; height: 700px;
      top: -8%; right: -12%;
      background: radial-gradient(circle, rgba(139,92,246,0.18) 0%, rgba(139,92,246,0) 70%);
      filter: blur(50px);
      animation: float-slow 20s ease-in-out infinite;
    }
    .orb--blue {
      width: 500px; height: 500px;
      top: 38%; left: -8%;
      background: radial-gradient(circle, rgba(59,130,246,0.14) 0%, rgba(59,130,246,0) 70%);
      filter: blur(50px);
      animation: float-medium 15s ease-in-out infinite;
    }
    .orb--pink {
      width: 400px; height: 400px;
      bottom: 8%; right: 10%;
      background: radial-gradient(circle, rgba(236,72,153,0.12) 0%, rgba(236,72,153,0) 70%);
      filter: blur(50px);
      animation: float-fast 10s ease-in-out infinite;
    }
    .orb--teal {
      width: 450px; height: 450px;
      top: 18%; left: 35%;
      background: radial-gradient(circle, rgba(20,184,166,0.1) 0%, rgba(20,184,166,0) 70%);
      filter: blur(60px);
      animation: float-medium 15s ease-in-out infinite;
      animation-delay: -5s;
    }
    .orb--emerald {
      width: 350px; height: 350px;
      bottom: 30%; left: -5%;
      background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, rgba(16,185,129,0) 70%);
      filter: blur(50px);
      animation: float-slow 18s ease-in-out infinite;
      animation-delay: -8s;
    }

    /* Floating particles */
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      animation: pulse-glow 4s ease-in-out infinite;
      z-index: 1;
    }

    /* ─── Keyframes matching tailwind config ─── */
    @keyframes float-slow {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(30px, -30px) rotate(5deg); }
      50% { transform: translate(-20px, -60px) rotate(-5deg); }
      75% { transform: translate(20px, -30px) rotate(3deg); }
    }
    @keyframes float-medium {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-40px, -20px) scale(1.1); }
      66% { transform: translate(30px, -40px) scale(0.9); }
    }
    @keyframes float-fast {
      0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
      50% { transform: translate(20px, -30px) rotate(10deg) scale(1.05); }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.3); }
    }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Content layer ─── */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 80px 60px;
      width: 100%;
      height: 100%;
      justify-content: center;
      gap: 0;
      animation: fade-in-up 1s ease-out;
    }

    /* ─── Badge ─── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      border-radius: 9999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      margin-bottom: 48px;
    }
    .badge__dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #34D399;
      animation: pulse-glow 2s ease-in-out infinite;
      box-shadow: 0 0 12px rgba(52,211,153,0.5);
    }
    .badge__text {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.03em;
    }

    /* ─── Title ─── */
    .title {
      font-size: 120px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 0.9;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 64px;
      font-weight: 700;
      color: rgba(255,255,255,0.88);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    /* ─── Tagline ─── */
    .tagline {
      font-size: 22px;
      color: rgba(255,255,255,0.35);
      line-height: 1.6;
      max-width: 500px;
      margin-bottom: 56px;
    }

    /* ─── Info cards row ─── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
      max-width: 720px;
      margin-bottom: 56px;
    }
    .info-card {
      position: relative;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 32px 28px;
      backdrop-filter: blur(20px);
      text-align: center;
      overflow: hidden;
    }
    .info-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      z-index: -1;
    }
    .info-card:nth-child(1)::before { background: linear-gradient(135deg, rgba(139,92,246,0.12), transparent 60%); }
    .info-card:nth-child(2)::before { background: linear-gradient(135deg, rgba(59,130,246,0.12), transparent 60%); }
    .info-card:nth-child(3)::before { background: linear-gradient(135deg, rgba(20,184,166,0.12), transparent 60%); }
    .info-card:nth-child(4)::before { background: linear-gradient(135deg, rgba(236,72,153,0.12), transparent 60%); }

    .info-card__icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 22px;
    }
    .info-card:nth-child(1) .info-card__icon { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.2); }
    .info-card:nth-child(2) .info-card__icon { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.2); }
    .info-card:nth-child(3) .info-card__icon { background: rgba(20,184,166,0.15); border: 1px solid rgba(20,184,166,0.2); }
    .info-card:nth-child(4) .info-card__icon { background: rgba(236,72,153,0.15); border: 1px solid rgba(236,72,153,0.2); }

    .info-card__value {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 4px;
    }
    .info-card__label {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ─── QR Code section ─── */
    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin-bottom: 48px;
    }
    .qr-container {
      position: relative;
      padding: 28px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 32px;
      backdrop-filter: blur(20px);
    }
    .qr-container::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 32px;
      background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(59,130,246,0.1), rgba(20,184,166,0.15));
      z-index: -1;
    }
    .qr-glow {
      position: absolute;
      inset: -40px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 70%);
      z-index: -2;
    }
    #qr-code canvas, #qr-code svg {
      border-radius: 16px;
    }

    .qr-label {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.04em;
    }
    .qr-url {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,0.25);
      font-family: 'Inter', monospace;
    }

    /* ─── Scan CTA ─── */
    .scan-cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 36px;
      background: #fff;
      color: #000;
      font-size: 18px;
      font-weight: 700;
      border-radius: 16px;
      border: none;
      letter-spacing: -0.01em;
      box-shadow: 0 0 60px rgba(255,255,255,0.08);
    }
    .scan-cta svg {
      width: 20px;
      height: 20px;
    }

    /* ─── Bottom wave (static version of WaveAnimation.tsx) ─── */
    .wave-section {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 5;
      overflow: hidden;
    }
    .wave-section svg {
      display: block;
      width: 100%;
      height: 220px;
    }

    /* Bottom gradient fade */
    .bottom-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      z-index: 4;
    }

    /* ─── Top decorative line ─── */
    .top-line {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 3px;
      border-radius: 0 0 4px 4px;
      background: linear-gradient(90deg, transparent, var(--violet), var(--blue), var(--teal), transparent);
      opacity: 0.5;
      z-index: 10;
    }

    /* ─── Footer text ─── */
    .footer {
      font-size: 14px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.05em;
    }

    /* ─── Responsive scaling for screens ─── */
    @media (max-height: 1920px) {
      body {
        align-items: flex-start;
      }
      .poster {
        transform-origin: top center;
        transform: scale(min(1, calc(100vh / 1920px)));
      }
    }
    @media screen and (max-width: 1080px) {
      .poster {
        transform: scale(calc(100vw / 1080));
        transform-origin: top left;
      }
    }
  </style>
</head>
<body>
  <div class="poster">
    <!-- Floating Orbs Background -->
    <div class="orb orb--purple"></div>
    <div class="orb orb--blue"></div>
    <div class="orb orb--pink"></div>
    <div class="orb orb--teal"></div>
    <div class="orb orb--emerald"></div>

    <!-- Floating particles -->
    <div class="particle" style="top:12%; left:15%; animation-delay:0s;"></div>
    <div class="particle" style="top:25%; left:80%; animation-delay:0.7s;"></div>
    <div class="particle" style="top:45%; left:20%; animation-delay:1.4s;"></div>
    <div class="particle" style="top:60%; left:70%; animation-delay:2.1s;"></div>
    <div class="particle" style="top:75%; left:40%; animation-delay:2.8s;"></div>
    <div class="particle" style="top:35%; left:55%; animation-delay:3.5s;"></div>
    <div class="particle" style="top:85%; left:85%; animation-delay:0.35s;"></div>
    <div class="particle" style="top:18%; left:60%; animation-delay:1.8s;"></div>

    <!-- Top decorative line -->
    <div class="top-line"></div>

    <!-- Main Content -->
    <div class="content">
      <!-- Badge -->
      <div class="badge">
        <span class="badge__dot"></span>
        <span class="badge__text">Registration Open</span>
      </div>

      <!-- Title -->
      <h1 class="title">CSN 2026</h1>
      <h2 class="subtitle">Coding Challenge</h2>

      <!-- Tagline -->
      <p class="tagline">Compete. Create. Conquer.<br/>Register your school's teams today.</p>

      <!-- Info Cards -->
      <div class="info-grid">
        <div class="info-card">
          <div class="info-card__icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
          <div class="info-card__value">2026</div>
          <div class="info-card__label">Competition Year</div>
        </div>
        <div class="info-card">
          <div class="info-card__icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
          <div class="info-card__value">$40</div>
          <div class="info-card__label">Per Team</div>
        </div>
        <div class="info-card">
          <div class="info-card__icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#14B8A6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <div class="info-card__value">Teams</div>
          <div class="info-card__label">Compete Together</div>
        </div>
        <div class="info-card">
          <div class="info-card__icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#EC4899" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </div>
          <div class="info-card__value">Code</div>
          <div class="info-card__label">Show Your Skills</div>
        </div>
      </div>

      <!-- QR Code Section -->
      <div class="qr-section">
        <div class="qr-container">
          <div class="qr-glow"></div>
          <div id="qr-code"></div>
        </div>
        <div class="scan-cta">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v4"/>
            <path d="M9 21H5a2 2 0 0 1-2-2v-4"/>
            <path d="M21 15v4a2 2 0 0 1-2 2h-4"/>
            <path d="M3 9V5a2 2 0 0 1 2-2h4"/>
          </svg>
          Scan to Register
        </div>
        <span class="qr-url">csn2026.com/register</span>
      </div>

      <!-- Footer -->
      <p class="footer">CSN CODING CHALLENGE &bull; 2026</p>
    </div>

    <!-- Wave Animation (static SVG matching WaveAnimation.tsx) -->
    <div class="wave-section">
      <svg viewBox="0 0 1440 220" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="wg1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#8B5CF6"/>
            <stop offset="50%" stop-color="#3B82F6"/>
            <stop offset="100%" stop-color="#14B8A6"/>
          </linearGradient>
          <linearGradient id="wg2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#EC4899"/>
            <stop offset="100%" stop-color="#8B5CF6"/>
          </linearGradient>
        </defs>
        <!-- Back wave -->
        <path d="M0,100 C240,140 480,60 720,100 C960,140 1200,60 1440,100 L1440,220 L0,220 Z" fill="url(#wg2)" opacity="0.25"/>
        <!-- Middle wave -->
        <path d="M0,120 C360,160 720,80 1080,120 C1260,140 1380,100 1440,120 L1440,220 L0,220 Z" fill="url(#wg1)" opacity="0.4"/>
        <!-- Front wave -->
        <path d="M0,150 C200,180 400,130 600,155 C800,180 1000,130 1200,155 C1350,165 1440,150 1440,150 L1440,220 L0,220 Z" fill="url(#wg1)" opacity="0.6"/>
      </svg>
    </div>

    <!-- Bottom gradient fade -->
    <div class="bottom-fade"></div>
  </div>

  <script>
    // ─── QR Code Configuration ───
    // Update this URL to your deployed registration page
    const REGISTRATION_URL = "https://csn2026.com/register";

    // Modern styled QR code using qr-code-styling
    const qrCode = new QRCodeStyling({
      width: 240,
      height: 240,
      type: "svg",
      data: REGISTRATION_URL,
      dotsOptions: {
        color: "#ffffff",
        type: "rounded"           // Modern rounded dots
      },
      cornersSquareOptions: {
        color: "#ffffff",
        type: "extra-rounded"     // Rounded corner squares
      },
      cornersDotOptions: {
        color: "#8B5CF6",         // Violet accent on corner dots
        type: "dot"
      },
      backgroundOptions: {
        color: "transparent"      // Transparent to show glass card bg
      },
      qrOptions: {
        errorCorrectionLevel: "M"
      }
    });

    qrCode.append(document.getElementById("qr-code"));
  </script>
</body>
</html>
